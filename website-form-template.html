<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма обратной связи</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            overflow: hidden;
        }

        .form-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .form-header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .form-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .form-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #999;
        }

        .form-group.required label::after {
            content: " *";
            color: #e74c3c;
        }

        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn.loading {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .submit-btn.loading::after {
            content: " ⏳";
        }

        .message {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        .message.show {
            display: block;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-header">
            <h1>📬 Связаться с нами</h1>
            <p>Отправьте вашу заявку - мы ответим в течение 2 часов</p>
        </div>

        <form id="crm-form" class="form-body">
            <div id="message" class="message"></div>

            <div class="form-group required">
                <label for="name">Ваше имя</label>
                <input type="text" id="name" name="client_name" required>
            </div>

            <div class="form-group required">
                <label for="email">Email</label>
                <input type="email" id="email" name="client_email" required>
            </div>

            <div class="form-group">
                <label for="phone">Телефон</label>
                <input type="tel" id="phone" name="client_phone" placeholder="+7 (999) 999-99-99">
            </div>

            <div class="form-group">
                <label for="company">Компания</label>
                <input type="text" id="company" name="client_company" placeholder="Название вашей компании">
            </div>

            <div class="form-group required">
                <label for="message">Сообщение</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submit-btn">
                Отправить заявку
            </button>
        </form>
    </div>

    <script>
        // ⚙️ КОНФИГУРАЦИЯ - ЗАМЕНИТЕ ЭТИ ЗНАЧЕНИЯ
        const CONFIG = {
            // Получите эти значения из CRM на странице Sites
            WEBHOOK_URL: 'https://YOUR_SUPABASE_URL/functions/v1/web-leads-webhook',
            WEBHOOK_TOKEN: 'YOUR_WEBHOOK_TOKEN_HERE',
        };

        const form = document.getElementById('crm-form');
        const submitBtn = document.getElementById('submit-btn');
        const messageDiv = document.getElementById('message');

        // Вспомогательная функция для показа сообщений
        function showMessage(text, type = 'success') {
            messageDiv.textContent = text;
            messageDiv.className = `message show ${type}`;
            
            // Автоматически скрыть сообщение через 5 секунд
            setTimeout(() => {
                messageDiv.classList.remove('show');
            }, 5000);
        }

        // Получить текущий URL страницы и referrer
        function getPageInfo() {
            return {
                page_url: window.location.href,
                referrer: document.referrer,
                user_agent: navigator.userAgent,
            };
        }

        // Обработка отправки формы
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Проверка конфигурации
            if (!CONFIG.WEBHOOK_TOKEN || CONFIG.WEBHOOK_TOKEN === 'YOUR_WEBHOOK_TOKEN_HERE') {
                showMessage('❌ Ошибка: Вебхук не настроен. Свяжитесь с владельцем сайта.', 'error');
                return;
            }

            // Блокировка кнопки отправки
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span> Отправка...';

            try {
                // Собрать данные формы
                const formData = new FormData(form);
                const payload = {
                    client_name: formData.get('client_name'),
                    client_email: formData.get('client_email'),
                    client_phone: formData.get('client_phone'),
                    client_company: formData.get('client_company'),
                    message: formData.get('message'),
                    ...getPageInfo(),
                    form_data: Object.fromEntries(formData),
                    auto_create_order: true, // Автоматически создавать ордер
                };

                // Отправить данные на вебхук
                const response = await fetch(CONFIG.WEBHOOK_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-webhook-token': CONFIG.WEBHOOK_TOKEN,
                    },
                    body: JSON.stringify(payload),
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    showMessage('✅ Спасибо! Ваша заявка отправлена. Мы свяжемся с вами в течение 2 часов.', 'success');
                    form.reset();
                } else {
                    showMessage(`❌ Ошибка: ${result.error || 'Не удалось отправить заявку'}`, 'error');
                }
            } catch (error) {
                console.error('Form submission error:', error);
                showMessage('❌ Ошибка сети. Попробуйте позже.', 'error');
            } finally {
                // Восстановить кнопку отправки
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Отправить заявку';
            }
        });

        console.log('✅ Форма инициализирована. Убедитесь что WEBHOOK_TOKEN установлен правильно.');
    </script>
</body>
</html>
